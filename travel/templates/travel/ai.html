<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wisamigo AI</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:url("https://images.unsplash.com/photo-1507525428034-b723cf961d3e");
    background-size:cover;
    background-position:center;
    background-repeat:no-repeat;
    height:100vh;
}

.overlay{
    width:100%;
    height:100vh;
    padding:20px;

    background:linear-gradient(
        rgba(0,0,0,.2),
        rgba(0,0,0,.4)
    );

    display:flex;
    justify-content:center;
    align-items:center;
}

.chat-box{

    width:100%;
    max-width:1400px;

    height:calc(100vh - 40px);

    background:rgba(255,255,255,.12);

    backdrop-filter:blur(20px);
    -webkit-backdrop-filter:blur(20px);

    border:1px solid rgba(255,255,255,.2);

    border-radius:25px;

    overflow:hidden;

    box-shadow:0 8px 32px rgba(0,0,0,.3);
}

.chat-header{

    background:linear-gradient(
        90deg,
        #0d6efd,
        #1cc8ff
    );

    color:white;

    padding:20px 30px;

    font-size:32px;

    font-weight:bold;
}

#hasil{

    height:calc(100vh - 210px);

    overflow-y:auto;

    padding:25px;

    background:rgba(255,255,255,.05);
}

.user-msg{
    text-align:right;
    margin-bottom:20px;
}

.user-msg span{

    background:#0d6efd;

    color:white;

    padding:12px 18px;

    border-radius:18px;

    display:inline-block;

    max-width:70%;

    word-wrap:break-word;
}

.ai-msg{
    text-align:left;
    margin-bottom:20px;
}

.ai-msg span{

    background:rgba(255,255,255,.9);

    color:#222;

    padding:12px 18px;

    border-radius:18px;

    display:inline-block;

    max-width:75%;

    word-wrap:break-word;
}

.chat-footer{

    padding:15px;

    background:rgba(255,255,255,.08);
}

.form-control{

    height:55px;

    border:none !important;

    border-radius:15px !important;
}

.btn-primary{

    width:120px;

    border-radius:15px;
}

#hasil::-webkit-scrollbar{
    width:8px;
}

#hasil::-webkit-scrollbar-thumb{
    background:#0d6efd;
    border-radius:20px;
}

@media(max-width:768px){

    .chat-header{
        font-size:24px;
    }

    .user-msg span,
    .ai-msg span{
        max-width:90%;
    }

    .btn-primary{
        width:90px;
    }

}

</style>

</head>
<body>

<div class="overlay">

<div class="chat-box">

<div class="chat-header">
🤖 Wisamigo AI
</div>

<div id="hasil"></div>

<div class="chat-footer">

<div class="input-group">

<input
type="text"
id="msg"
class="form-control"
placeholder="Tanyakan destinasi wisata..."
>

<button
class="btn btn-primary"
onclick="kirim()">
Kirim
</button>

</div>

</div>

</div>

</div>

<script>

function kirim(){

let pesan=document.getElementById("msg").value;

if(pesan.trim()=="") return;

document.getElementById("hasil").innerHTML +=
`
<div class="user-msg">
<span>${pesan}</span>
</div>
`;

fetch(`/ai-chat/?message=${encodeURIComponent(pesan)}`)
.then(res=>res.json())
.then(data=>{
    const reply = data.reply || 'Maaf, respons AI tidak tersedia. Silakan coba lagi.';
    document.getElementById("hasil").innerHTML +=
    `
<div class="ai-msg">
<span>${reply}</span>
</div>
`;
    document.getElementById("msg").value="";
    let chat=document.getElementById("hasil");
    chat.scrollTop=chat.scrollHeight;
})
.catch(error=>{
    console.error(error);
    document.getElementById("hasil").innerHTML +=
    `
<div class="ai-msg">
<span>Maaf, AI gagal merespons. Coba lagi nanti.</span>
</div>
`;
});

}

document.getElementById("msg").addEventListener("keypress",function(e){

if(e.key==="Enter"){
kirim();
}

});

</script>

</body>
</html>
